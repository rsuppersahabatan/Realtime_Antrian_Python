version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: antrian-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-antrian_db}
      MYSQL_USER: ${MYSQL_USER:-antrian_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-antrian_pass}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - antrian-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpassword}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python FastAPI Backend Server
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: antrian-backend
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${SERVER_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - antrian-network

  # React Vite Frontend Client
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: antrian-frontend
    restart: unless-stopped
    ports:
      - "${CLIENT_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - antrian-network

networks:
  antrian-network:
    driver: bridge

volumes:
  mysql_data:
